# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: https
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor:
# When to interactively prompt. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prompt: enabled
# A pager program to send command output to, e.g. "less". Set the value to "cat" to disable the pager.
pager:
# Aliases allow you to create nicknames for gh commands
aliases: {uni: '!cp ~/.config/gh/hosts.yml.uni ~/.config/gh/hosts.yml && gh auth status', personal: '!cp ~/.config/gh/hosts.yml.personal ~/.config/gh/hosts.yml && gh auth status', 'collab:add': api -X PUT repos/$1/$2/collaborators/$3 -f permission=$4, 'inv:decline': api -X DELETE user/repository_invitations/$1, 'inv:delete': api -X DELETE repos/$1/$2/invitations/$3, 'collab:list': api repos/$1/$2/collaborators, 'inv:list': api repos/$1/$2/invitations, 'inv:accept': api -X PATCH user/repository_invitations/$1, 'collab:remove': api -X DELETE repos/$1/$2/collaborators/$3, 'repo:content': api repos/$1/$2/contents/$3, 'inv:mine': api user/repository_invitations, 'traffic:clones': api /repos/$1/$2/traffic/clones, 'traffic:refsources': api /repos/$1/$2/traffic/popular/referrers, 'traffic:refpaths': api /repos/$1/$2/traffic/popular/paths, 'traffic:views': api /repos/$1/$2/traffic/views}
# The path to a unix socket through which send HTTP connections. If blank, HTTP traffic will be handled by net/http.DefaultTransport.
http_unix_socket:
# What web browser gh should use when opening URLs. If blank, will refer to environment.
browser:
version: "1"
